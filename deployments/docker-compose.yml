services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - livekit
    networks:
      - edge

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    expose:
      - "8080"
    environment:
      RADIANCE_ADDR: ":8080"
      RADIANCE_STATIC_DIR: "/app/web"
      RADIANCE_MIGRATIONS_DIR: "/app/migrations"
      DATABASE_URL: "postgres://radiance:radiance@postgres:5432/radiance?sslmode=disable"
      LIVEKIT_URL: "ws://localhost:8080/livekit"
      LIVEKIT_API_URL: "http://livekit:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "secret"
    depends_on:
      - postgres
    networks:
      - edge
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiance
      POSTGRES_USER: radiance
      POSTGRES_PASSWORD: radiance
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    expose:
      - "7880"
      - "7881"
    ports:
      - "127.0.0.1:50000-50100:50000-50100/udp"
    networks:
      - edge
      - backend

  coturn:
    image: coturn/coturn:latest
    command: ["-n", "--log-file=stdout", "--min-port=49160", "--max-port=49200", "--lt-cred-mech", "--user=radiance:radiance", "--realm=radiance.local"]
    ports:
      - "127.0.0.1:3478:3478"
      - "127.0.0.1:3478:3478/udp"
      - "127.0.0.1:49160-49200:49160-49200/udp"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  edge:
  backend:
    internal: true
