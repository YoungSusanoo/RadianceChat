services:
  proxy:
    image: nginx:1.27-alpine
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - livekit

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      RADIANCE_ADDR: ":8080"
      RADIANCE_STATIC_DIR: "/app/web"
      RADIANCE_MIGRATIONS_DIR: "/app/migrations"
      DATABASE_URL: "postgres://radiance:radiance@postgres:5432/radiance?sslmode=disable"
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      LIVEKIT_API_URL: "http://host.docker.internal:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiance
      POSTGRES_USER: radiance
      POSTGRES_PASSWORD: radiance
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  postgres_data:

networks:
  backend:
    internal: true
