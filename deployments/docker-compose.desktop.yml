services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - livekit
    networks:
      - edge

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    expose:
      - "8080"
    environment:
      RADIANCE_ADDR: ":8080"
      RADIANCE_STATIC_DIR: "/app/web"
      RADIANCE_MIGRATIONS_DIR: "/app/migrations"
      DATABASE_URL: "postgres://radiance:radiance@postgres:5432/radiance?sslmode=disable"
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      LIVEKIT_API_URL: "http://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
    depends_on:
      - postgres
    networks:
      - edge
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiance
      POSTGRES_USER: radiance
      POSTGRES_PASSWORD: radiance
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LAN_HOST:?LAN_HOST is required for Docker Desktop LAN profile}"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./livekit.desktop.yaml:/etc/livekit.yaml:ro
    expose:
      - "7880"
    ports:
      - "0.0.0.0:7881:7881/tcp"
      - "0.0.0.0:50000-50100:50000-50100/udp"
    networks:
      - edge
      - backend

volumes:
  postgres_data:

networks:
  edge:
  backend:
    internal: true
