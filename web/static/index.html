<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Radiance</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="rail">
        <header class="brand">
          <div class="brand-mark">R</div>
          <div>
            <h1>Radiance</h1>
            <p>Звонки, комнаты и чат</p>
          </div>
        </header>

        <section id="authCard" class="surface">
          <div class="switch">
            <button id="loginTab" class="active" type="button">Вход</button>
            <button id="registerTab" type="button">Регистрация</button>
          </div>
          <label id="nameField">
            Имя
            <input id="nameInput" autocomplete="name" placeholder="Анна">
          </label>
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" placeholder="anna@example.com">
          </label>
          <label>
            Пароль
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Минимум 4 символа">
          </label>
          <button id="authButton" class="button primary" type="button">Войти</button>
        </section>

        <section id="profileCard" class="surface hidden">
          <div class="profile-line">
            <div>
              <strong id="profileName">-</strong>
              <span id="profileEmail">-</span>
            </div>
            <button id="logoutButton" class="button quiet" type="button">Выйти</button>
          </div>
        </section>

        <section class="surface">
          <div class="section-title">
            <h2>Создать комнату</h2>
          </div>
          <label>
            Название
            <input id="roomNameInput" placeholder="Командный созвон">
          </label>
          <label>
            Описание
            <input id="roomDescriptionInput" placeholder="Короткая встреча">
          </label>
          <div class="switch">
            <button id="publicRoomButton" class="active" type="button">Публичная</button>
            <button id="privateRoomButton" type="button">Приватная</button>
          </div>
          <button id="createRoomButton" class="button primary" type="button">Создать комнату</button>
        </section>

        <section class="surface rooms-surface">
          <div class="section-title">
            <h2>Публичные комнаты</h2>
            <button id="refreshRoomsButton" class="button icon" type="button" title="Обновить">R</button>
          </div>
          <div id="roomsList" class="rooms-list"></div>
        </section>
      </aside>

      <section class="meeting">
        <header class="meeting-header">
          <div>
            <h2 id="roomTitle">Комната не выбрана</h2>
            <p id="roomMeta">Создайте комнату или войдите в существующую.</p>
          </div>
          <div class="header-actions">
            <button id="copyInviteButton" class="button quiet hidden" type="button">Ссылка</button>
            <button id="leaveRoomButton" class="button quiet hidden" type="button">Выйти</button>
            <button id="endRoomButton" class="button danger hidden" type="button">Завершить</button>
          </div>
        </header>

        <section class="stage">
          <div id="mediaGrid" class="media-grid">
            <article class="video-tile local">
              <video id="localVideo" muted autoplay playsinline></video>
              <div class="tile-caption">
                <strong>Вы</strong>
                <span id="localState">медиа не подключено</span>
              </div>
            </article>
            <div id="remoteTiles" class="remote-grid"></div>
          </div>

          <footer class="callbar">
            <button id="micButton" class="button control" type="button">Mic off</button>
            <button id="cameraButton" class="button control" type="button">Cam off</button>
            <button id="joinMediaButton" class="button primary wide" type="button">Подключить звонок</button>
          </footer>
        </section>
      </section>

      <aside class="side">
        <section class="surface participants-surface">
          <div class="section-title">
            <h2>Участники</h2>
            <span id="participantCount">0</span>
          </div>
          <div id="participantsList" class="participants-list"></div>
        </section>

        <section class="surface chat-surface">
          <div class="section-title">
            <h2>Чат</h2>
          </div>
          <div id="messagesList" class="messages-list"></div>
          <form id="messageForm" class="message-form">
            <input id="messageInput" placeholder="Написать сообщение" autocomplete="off">
            <button class="button primary" type="submit">Отправить</button>
          </form>
        </section>
      </aside>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js"></script>
  </body>
</html>
