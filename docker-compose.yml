services:
  db:
    image: postgres:17-alpine
    container_name: radiance_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - radiance_net

  app:
    build: .
    container_name: radiance_backend
    env_file:
      - .env
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - radiance_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: radiance_frontend
    ports:
      - "8090:80"
    depends_on:
      - app
    networks:
      - radiance_net

networks:
  radiance_net:
    driver: bridge

volumes:
  postgres_data: