<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiance Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Radiance 🎙️</h1>
    <p class="subtitle">Присоединяйтесь к серверу</p>

    <div class="card">
      <form id="authForm">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="Введите email" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" required placeholder="Введите пароль">
        </div>

        <div class="button-group">
          <button type="button" id="loginBtn" class="btn primary">Войти</button>
          <button type="button" id="registerBtn" class="btn secondary">Регистрация</button>
        </div>
      </form>
    </div>

    <div id="server-response" class="response-box hidden">
      <!-- Здесь будут ответы от Go-бэкенда -->
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
